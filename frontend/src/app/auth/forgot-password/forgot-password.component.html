<div class="min-h-screen flex items-center justify-center p-4 pt-20">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-lg overflow-hidden p-8" style="box-shadow: rgba(0,0,0,0.15) 0px 5px 15px;">

      <!-- Logo -->
      <div class="text-center mb-6">
        <div class="w-14 h-14 mx-auto mb-3 flex items-center justify-center">
          <img src="/images/CrediScore.png" alt="CrediScore" class="w-full h-full object-contain">
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Forgot Password</h1>
        <p class="text-gray-500 text-sm mt-1">Enter your email and we'll send you a reset link</p>
      </div>

      <!-- Success State -->
      <div *ngIf="submitted()" class="text-center py-4">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-envelope-open-text text-green-600 text-2xl"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-900 mb-2">Check your inbox</h3>
        <p class="text-gray-600 text-sm mb-6">
          If an account with that email exists, we've sent password reset instructions. The link expires in 1 hour.
        </p>
        <a routerLink="/auth/login"
           class="w-full block text-center py-2 px-4 rounded-lg font-medium text-white transition-all"
           style="background-color: #2C5270;">
          Back to Login
        </a>
      </div>

      <!-- Form -->
      <form *ngIf="!submitted()" [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input
            formControlName="email"
            type="email"
            id="email"
            placeholder="you@example.com"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-300 focus:border-transparent">
          <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-xs text-red-600 mt-1">
            Please enter a valid email address.
          </div>
        </div>

        <div *ngIf="error()" class="text-xs text-red-600 bg-red-50 p-3 rounded-lg">
          {{ error() }}
        </div>

        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full py-2 px-4 rounded-lg font-medium text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          style="background-color: #2C5270;">
          <span *ngIf="isLoading()" class="flex items-center justify-center">
            <span class="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
            Sending...
          </span>
          <span *ngIf="!isLoading()">Send Reset Link</span>
        </button>

        <div class="text-center text-sm text-gray-600">
          Remember your password?
          <a routerLink="/auth/login" class="font-medium underline" style="color: #2C5270;">Sign in</a>
        </div>
      </form>
    </div>
  </div>
</div>
