<div class="min-h-screen flex items-center justify-center p-4 pt-20">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-lg overflow-hidden p-8" style="box-shadow: rgba(0,0,0,0.15) 0px 5px 15px;">

      <!-- Logo -->
      <div class="text-center mb-6">
        <div class="w-14 h-14 mx-auto mb-3 flex items-center justify-center">
          <img src="/images/CrediScore.png" alt="CrediScore" class="w-full h-full object-contain">
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Two-Factor Authentication</h1>
        <p class="text-gray-500 text-sm mt-1">Enter the 6-digit code from your authenticator app</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label for="token" class="block text-sm font-medium text-gray-700 mb-1">Authentication Code</label>
          <input
            formControlName="token"
            type="text"
            id="token"
            inputmode="numeric"
            maxlength="6"
            placeholder="000000"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-center text-2xl tracking-widest font-mono focus:ring-2 focus:ring-blue-300 focus:border-transparent">
          <div *ngIf="form.get('token')?.invalid && form.get('token')?.touched" class="text-xs text-red-600 mt-1">
            Please enter a valid 6-digit code.
          </div>
        </div>

        <div *ngIf="error()" class="text-xs text-red-600 bg-red-50 p-3 rounded-lg">
          {{ error() }}
        </div>

        <button
          type="submit"
          [disabled]="isLoading() || form.invalid"
          class="w-full py-2 px-4 rounded-lg font-medium text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          style="background-color: #2C5270;">
          <span *ngIf="isLoading()" class="flex items-center justify-center">
            <span class="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
            Verifying...
          </span>
          <span *ngIf="!isLoading()">Verify</span>
        </button>

        <div class="text-center text-sm text-gray-600">
          <a routerLink="/auth/login" class="font-medium underline" style="color: #2C5270;">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
