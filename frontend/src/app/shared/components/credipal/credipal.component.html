<div class="credipal-widget" [class.expanded]="isExpanded">
  <button
    type="button"
    class="credipal-toggle-btn"
    [class.pulse]="!isOpen"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen"
    aria-label="Open CrediPal assistant"
  >
    <span class="credipal-animal-bubble" aria-hidden="true">🦉</span>
    <i class="uil" [ngClass]="isOpen ? 'uil-times' : 'uil-comment-question'"></i>
  </button>

  <div class="credipal-panel" *ngIf="isOpen">
    <div class="credipal-header">
      <div class="credipal-header-copy">
        <h4><span class="credipal-animal-inline" aria-hidden="true">🦉</span> CrediPal</h4>
        <p>Your site interaction guide</p>
      </div>
      <div class="credipal-header-actions">
        <button
          type="button"
          class="credipal-header-btn"
          (click)="toggleExpanded()"
          [attr.aria-label]="isExpanded ? 'Collapse CrediPal panel' : 'Expand CrediPal panel'"
        >
          <i class="uil" [ngClass]="isExpanded ? 'uil-compress' : 'uil-expand-arrows'"></i>
        </button>
      </div>
    </div>

    <div class="credipal-messages">
      <div *ngFor="let message of messages" class="credipal-message" [class.user]="message.role === 'user'">
        <span *ngIf="message.role === 'bot'" class="credipal-bot-stamp" aria-hidden="true">🦉</span>
        {{ message.text }}
      </div>
      <div *ngIf="isTyping" class="credipal-typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="credipal-section">
      <button type="button" class="credipal-section-toggle" (click)="toggleQuickQuestions()">
        <span>Quick Questions</span>
        <i class="uil" [ngClass]="showQuickQuestions ? 'uil-angle-up' : 'uil-angle-down'"></i>
      </button>
      <div class="credipal-prompts" *ngIf="showQuickQuestions">
        <button type="button" *ngFor="let prompt of prompts" (click)="ask(prompt)">
          {{ prompt.label }}
        </button>
      </div>
    </div>

    <div class="credipal-section">
      <button type="button" class="credipal-section-toggle" (click)="toggleQuickActions()">
        <span>Quick Navigation</span>
        <i class="uil" [ngClass]="showQuickActions ? 'uil-angle-up' : 'uil-angle-down'"></i>
      </button>
      <div class="credipal-actions" *ngIf="showQuickActions">
        <a
          *ngFor="let item of quickNavigationLinks"
          [routerLink]="item.path"
          class="credipal-nav-link"
          (click)="$event.preventDefault(); goTo(item.path)"
        >
          <span>{{ item.label }}</span>
          <small>{{ item.path }} · {{ item.hint }}</small>
        </a>
      </div>
    </div>

    <form class="credipal-input" (submit)="$event.preventDefault(); askQuestion()">
      <input
        type="text"
        [(ngModel)]="question"
        name="credipal-question"
        placeholder="Ask CrediPal anything about the system..."
      />
      <button type="submit">Ask</button>
    </form>
  </div>
</div>
